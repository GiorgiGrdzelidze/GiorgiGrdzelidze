# ═══════════════════════════════════════════════════════════════════════
#  Generate Snake Animation from GitHub Contribution Graph
#  Uses: https://github.com/Platane/snk
#  Output branch: output
# ═══════════════════════════════════════════════════════════════════════

name: Generate Snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake animation files
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            # Light mode - GitHub native colors
            dist/github-snake.svg?palette=github-light&color_snake=#2ea44f
            # Dark mode - GitHub native colors  
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#3fb950

      - name: Push snake animation to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
