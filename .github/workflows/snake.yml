# ═══════════════════════════════════════════════════════════════════════
#  Generate a snake animation from the GitHub contribution graph
#  Uses: https://github.com/Platane/snk
#  Output branch: output
# ═══════════════════════════════════════════════════════════════════════

name: Generate Snake

on:
  # Run automatically every 6 hours
  schedule:
    - cron: "0 */6 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

  # Also run on pushes to main
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate snake animation files
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake.svg?color_snake=#38bdf8&color_dots=#0d1117,#0f1c2e,#123456,#1d4ed8,#38bdf8
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#38bdf8&color_dots=#0d1117,#0f1c2e,#123456,#1d4ed8,#38bdf8
      - name: Push snake animation to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
